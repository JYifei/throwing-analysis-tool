<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Throwing Analysis Tool</title>

  <style>
    :root {
      --border:#e5e7eb;
      --muted:#6b7280;
      --bg:#fafafa;
      --card-bg:#ffffff;
      --danger:#991b1b;
      --danger-border:#fca5a5;
      --danger-bg:#fff7f7;
    }

    * { box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      margin:0;
      background:var(--bg);
      color:#111827;
    }

    header {
      padding:16px 20px;
      border-bottom:1px solid var(--border);
      background:white;
    }

    header h1 {
      margin:0;
      font-size:20px;
    }

    header .sub {
      margin-top:6px;
      font-size:14px;
      color:var(--muted);
    }

    /* ===== Overall page layout ===== */
    .page {
      display:grid;
      grid-template-columns: 320px minmax(0, 1fr);
      grid-template-areas:
        "upload preview"
        "result result";
      gap:16px;
      padding:16px;
      max-width:1360px;
      margin:0 auto;
    }

    @media (max-width: 1100px) {
      .page {
        grid-template-columns: 1fr;
        grid-template-areas:
          "upload"
          "preview"
          "result";
      }
    }

    .upload-card { grid-area: upload; }
    .preview-card { grid-area: preview; }
    .result-card { grid-area: result; }

    .card {
      background:var(--card-bg);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
    }

    .card h2 {
      margin:0 0 10px;
      font-size:15px;
    }

    .muted {
      color:var(--muted);
      font-size:12px;
    }

    .row {
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn {
      padding:8px 12px;
      border:1px solid #111827;
      border-radius:8px;
      background:#111827;
      color:#fff;
      cursor:pointer;
      font-size:14px;
    }

    .btn.secondary {
      background:#fff;
      color:#111827;
      border-color:var(--border);
    }

    .btn:disabled {
      opacity:0.5;
      cursor:not-allowed;
    }

    .pill {
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      font-size:12px;
      background:#fff;
    }

    .pill.ok {
      background:#ecfdf5;
      border-color:#a7f3d0;
    }

    .pill.partial {
      background:#fffbeb;
      border-color:#fde68a;
    }

    .pill.missing_all {
      background:#fef2f2;
      border-color:#fecaca;
    }

    .pill.running {
      background:#eff6ff;
      border-color:#bfdbfe;
    }

    .pill.failed {
      background:#fef2f2;
      border-color:#fecaca;
    }

    .links a {
      font-size:13px;
      color:#1d4ed8;
      text-decoration:none;
    }

    .links a:hover {
      text-decoration:underline;
    }

    video {
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:black;
      display:block;
    }

    /* ===== Result panel: three columns ===== */
    .result-grid {
      display:grid;
      grid-template-columns: 320px 1fr 1.2fr;
      gap:18px;
      align-items:stretch;
      margin-top:8px;
    }

    @media (max-width: 1150px) {
      .result-grid {
        grid-template-columns: 1fr 1fr;
      }

      .howto-col {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .result-grid {
        grid-template-columns: 1fr;
      }

      .howto-col {
        grid-column: auto;
      }
    }

    .panel-box {
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      padding:16px 18px;
      height:100%;
    }

    .score-box {
      background:#f9fafb;
    }

    .score-kicker {
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .score-big {
      font-size:46px;
      font-weight:900;
      line-height:1;
      margin:0 0 12px 0;
    }

    .score-msg {
      font-size:22px;
      font-weight:850;
      line-height:1.2;
      margin:0;
      color:#4b5563;
    }

    .section-title {
      font-weight:850;
      font-size:20px;
      margin:0 0 12px 0;
      line-height:1.2;
    }

    .criteria-list {
      margin:0;
      padding:0;
    }

    .criteria-item {
      font-size:17px;
      line-height:1.7;
      margin:6px 0;
    }

    .howto-box {
      border:1.5px solid var(--danger-border);
      background:var(--danger-bg);
      border-radius:12px;
      padding:18px 20px;
      height:100%;
    }

    .howto-title {
      font-weight:900;
      font-size:22px;
      margin:0 0 14px 0;
      color:var(--danger);
      line-height:1.2;
    }

    .howto-item {
      font-size:18px;
      line-height:1.8;
      margin:10px 0;
      color:#374151;
    }

    .empty-note {
      font-size:14px;
      color:var(--muted);
    }
  </style>
</head>

<body>
  <header>
    <h1>Throwing Analysis Tool</h1>
    <div class="sub">Upload a video → run analysis → review the detected throw, score, and feedback.</div>
  </header>

  <div class="page">
    <!-- TOP LEFT -->
    <div class="card upload-card">
      <h2>1) Upload and Run</h2>

      <form id="jobForm">
        <div style="margin-bottom:10px;">
          <input id="videoFile" type="file" accept="video/*" required />
        </div>

        <div class="row">
          <button id="runBtn" class="btn" type="submit">Run Analysis</button>
          <button id="resetBtn" class="btn secondary" type="button">Reset</button>
          <span id="statusPill" class="pill">idle</span>
        </div>

        <div class="muted" id="statusText" style="margin-top:10px;">Ready.</div>
      </form>

      <div class="links" id="jobLinks" style="margin-top:12px;"></div>
    </div>

    <!-- TOP RIGHT -->
    <div class="card preview-card">
      <div class="row" style="justify-content:space-between;">
        <h2 style="margin:0;">Preview</h2>
        <div id="selectedInfo" class="muted">No result selected.</div>
      </div>

      <div style="margin-top:10px;">
        <video id="player" controls preload="metadata"></video>
      </div>
      <div id="videoHint" class="muted" style="margin-top:8px;"></div>
      <div id="videoErr" class="muted" style="margin-top:6px; color:#b91c1c;"></div>
    </div>

    <!-- BOTTOM FULL WIDTH -->
    <div class="card result-card">
      <h2>Analysis Result</h2>
      <div id="resultBox" class="muted">No result selected.</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    let currentJob = null;
    let manifest = null;
    let selectedThrow = null;

    function setStatus(label, pillClass = null, detail = null) {
      const pill = $("statusPill");
      pill.className = "pill" + (pillClass ? " " + pillClass : "");
      pill.textContent = label;
      if (detail !== null) $("statusText").textContent = detail;
    }

    function escapeHtml(s) {
      if (s === null || s === undefined) return "";
      return String(s).replace(/[&<>"']/g, m =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m])
      );
    }

    function sanitizeNonJsonNumbers(text) {
      return text
        .replace(/\bNaN\b/g, "null")
        .replace(/\b-Infinity\b/g, "null")
        .replace(/\bInfinity\b/g, "null");
    }

    async function safeFetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
      const text = await res.text();
      const safeText = sanitizeNonJsonNumbers(text);
      return JSON.parse(safeText);
    }

    function buildLinks(job) {
      if (!job) return "";
      const parts = [];
      if (job.job_url) parts.push(`<div><a href="${job.job_url}" target="_blank">Open job JSON</a></div>`);
      if (job.download_url) parts.push(`<div><a href="${job.download_url}" target="_blank">Download results.zip</a></div>`);
      if (job.job_id) parts.push(`<div class="muted">job_id: <code>${escapeHtml(job.job_id)}</code></div>`);
      return parts.join("");
    }

    function scoreMessage(p) {
      if (typeof p !== "number" || Number.isNaN(p)) return "";
      if (p > 95) return "Great throw!";
      if (p > 75) return "Good throw!";
      if (p > 50) return "Good try!";
      return "Let's try again:";
    }

    function feedbackLimitByScore(p) {
      if (typeof p !== "number" || Number.isNaN(p)) return 2;
      if (p > 95) return 0;
      if (p > 75) return 1;
      return 2;
    }

    function feedbackTextForItem(it) {
      const key = (it && it.key) ? String(it.key) : "";
      const notes = (it && it.student && Array.isArray(it.student.notes)) ? it.student.notes : [];

      if (key === "c1") {
        return "Bring the throwing arm back to form an L-shape";
      }

      if (key === "c2") {
        return "Open the shoulder so that the non-throwing side is facing the target";
      }

      if (key === "c3") {
        if (notes.includes("step_with_wrong_foot")) {
          return "Step forward with the opposite foot";
        }
        if (notes.includes("take_a_bigger_step")) {
          return "Take a bigger step forward with the opposite foot";
        }
        if (notes.includes("take_a_step_forward")) {
          return "Step forward with the opposite foot";
        }
        return "Step forward with the opposite foot";
      }

      if (key === "c4") {
        return "Follow through across your body";
      }

      return null;
    }

    function feedbackTextForExtraSignal(key) {
      if (key === "throw_higher") return "Throw higher";
      if (key === "throw_harder") return "Throw harder";
      return null;
    }

    function computeTopFeedback(criteriaObj, maxItems = 2) {
      const out = [];
      const seen = new Set();

      const items = Array.isArray(criteriaObj?.items) ? criteriaObj.items : [];
      const byKey = new Map(items.map(it => [String(it?.key || ""), it]));

      const ranking = Array.isArray(criteriaObj?.severity_ranking)
        ? criteriaObj.severity_ranking
        : [];

      if (ranking.length > 0) {
        for (const r of ranking) {
          if (r?.passed) continue;

          const key = String(r?.key || "");
          const item = byKey.get(key);
          if (!item) continue;

          const text = feedbackTextForItem(item);
          if (!text || seen.has(text)) continue;

          seen.add(text);
          out.push(text);
          if (out.length >= maxItems) return out;
        }
      }

      const failedItems = items
        .filter(it => !(it?.student?.passed))
        .map((it, idx) => ({
          idx,
          sev: Number(it?.student?.severity ?? 0),
          item: it,
        }))
        .sort((a, b) => {
          if (b.sev !== a.sev) return b.sev - a.sev;
          return a.idx - b.idx;
        });

      for (const x of failedItems) {
        const text = feedbackTextForItem(x.item);
        if (!text || seen.has(text)) continue;

        seen.add(text);
        out.push(text);
        if (out.length >= maxItems) return out;
      }

      const extra = criteriaObj?.extra_feedback_signals || {};
      for (const [key, obj] of Object.entries(extra)) {
        const stu = obj?.student;
        if (!stu || stu.passed !== false) continue;

        const text = feedbackTextForExtraSignal(key);
        if (!text || seen.has(text)) continue;

        seen.add(text);
        out.push(text);
        if (out.length >= maxItems) return out;
      }

      return out;
    }

    function renderResultBox(scoreObj, criteriaObj) {
      let percentRaw = scoreObj?.matching_percent;
      let percent = "-";

      if (typeof percentRaw === "number" && !Number.isNaN(percentRaw)) {
        if (percentRaw > 95) {
          percent = ">95";
        } else if (percentRaw < 20) {
          percent = "<20";
        } else {
          const nearest = Math.round(percentRaw);
          percent = (Math.abs(percentRaw - nearest) < 1e-9)
            ? String(nearest)
            : percentRaw.toFixed(1);
        }
      }

      const scoreMsg = scoreMessage(percentRaw);
      const feedbackLimit = feedbackLimitByScore(percentRaw);

      const items = Array.isArray(criteriaObj?.items) ? criteriaObj.items : [];
      const feedback = computeTopFeedback(criteriaObj, feedbackLimit);

      const criteriaHtml = items.length
        ? items.map(it => {
            const passed = (typeof it?.student?.passed === "boolean") ? it.student.passed : !!it.passed;
            const mark = passed ? "✅" : "❌";
            return `<div class="criteria-item">${mark} ${escapeHtml(it.name ?? it.label ?? it.key ?? "Criteria")}</div>`;
          }).join("")
        : `<div class="empty-note">No criteria available.</div>`;

      const howtoHtml = feedback.length
        ? feedback.map(t => `<div class="howto-item">• ${escapeHtml(t)}</div>`).join("")
        : `<div class="empty-note">No major issues detected.</div>`;

      return `
        <div class="result-grid">
          <div class="score-col">
            <div class="panel-box score-box">
              <div class="score-kicker">Overall matching score</div>
              <div class="score-big">${escapeHtml(String(percent))}%</div>
              <div class="score-msg">${escapeHtml(scoreMsg)}</div>
            </div>
          </div>

          <div class="criteria-col">
            <div class="panel-box">
              <div class="section-title">Criteria</div>
              <div class="criteria-list">
                ${criteriaHtml}
              </div>
            </div>
          </div>

          <div class="howto-col">
            <div class="howto-box">
              <div class="howto-title">How to improve</div>
              ${howtoHtml}
            </div>
          </div>
        </div>
      `;
    }

    async function updateVideoSource(t) {
      $("videoErr").textContent = "";
      const player = $("player");
      const hint = $("videoHint");

      if (!t.compare_video) {
        player.removeAttribute("src");
        player.load();
        hint.textContent = "compare.mp4 not found for this result.";
        return;
      }

      const bust = `v=${Date.now()}`;
      const url = t.compare_video + (t.compare_video.includes("?") ? "&" : "?") + bust;

      player.src = url;
      player.load();
      hint.textContent = "Previewing comparison video (compare.mp4).";
    }

    async function selectThrow(throwId) {
      if (!manifest || !manifest.throws || manifest.throws.length === 0) return;

      const t = manifest.throws.find(x => x.throw_id === throwId) || manifest.throws[0];
      selectedThrow = t;

      $("selectedInfo").textContent = `Detected throw • status=${t.status}`;

      await updateVideoSource(t);

      try {
        const score = t.score ? await safeFetchJson(t.score) : {};
        const criteria = t.criteria ? await safeFetchJson(t.criteria) : {};
        $("resultBox").innerHTML = renderResultBox(score, criteria);
      } catch (e) {
        $("resultBox").innerHTML = `<div class="muted">Failed to load results.</div>`;
      }
    }

    async function loadManifest(jobId) {
      const url = `/runs/${jobId}/outputs/manifest.json`;
      manifest = await safeFetchJson(url);

      if (manifest.throws && manifest.throws.length) {
        await selectThrow(manifest.throws[0].throw_id);
      } else {
        $("selectedInfo").textContent = "No throws found.";
        $("resultBox").innerHTML = `<div class="muted">No result available.</div>`;
      }
    }

    function resetUI() {
      currentJob = null;
      manifest = null;
      selectedThrow = null;

      $("videoFile").value = "";
      $("jobLinks").innerHTML = "";
      $("selectedInfo").textContent = "No result selected.";
      $("player").removeAttribute("src");
      $("player").load();
      $("resultBox").textContent = "No result selected.";
      $("videoHint").textContent = "";
      $("videoErr").textContent = "";

      setStatus("idle", null, "Ready.");
    }

    $("resetBtn").onclick = () => resetUI();

    $("jobForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const file = $("videoFile").files[0];
      if (!file) return;

      $("runBtn").disabled = true;
      setStatus("running", "running", "Uploading and running analysis…");

      $("resultBox").innerHTML = `<div class="muted">Running…</div>`;
      $("selectedInfo").textContent = "Running…";
      $("player").removeAttribute("src");
      $("player").load();
      $("videoHint").textContent = "";
      $("videoErr").textContent = "";
      $("jobLinks").innerHTML = "";

      try {
        const fd = new FormData();
        fd.append("video", file);

        const resp = await fetch("/api/jobs", { method: "POST", body: fd });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || "Job failed");

        currentJob = data;
        $("jobLinks").innerHTML = buildLinks(data);

        setStatus("done", "ok", "Completed. Loading results…");
        await loadManifest(data.job_id);
        setStatus("done", "ok", "Completed.");
      } catch (err) {
        setStatus("failed", "failed", "Failed: " + err);
        $("resultBox").innerHTML = `<div class="muted">Failed.</div>`;
      } finally {
        $("runBtn").disabled = false;
      }
    });

    const playerEl = $("player");
    playerEl.addEventListener("error", () => {
      const e = playerEl.error;
      const code = e ? e.code : null;
      const msgMap = {
        1: "MEDIA_ERR_ABORTED (playback aborted)",
        2: "MEDIA_ERR_NETWORK (network error)",
        3: "MEDIA_ERR_DECODE (decode error / unsupported codec)",
        4: "MEDIA_ERR_SRC_NOT_SUPPORTED (format not supported)",
      };
      const msg = code ? (msgMap[code] || ("Unknown media error code " + code)) : "Unknown media error";
      $("videoErr").textContent = "Video error: " + msg;
    });

    playerEl.addEventListener("loadedmetadata", () => {
      $("videoErr").textContent = "";
    });

    resetUI();
  </script>
</body>
</html>
